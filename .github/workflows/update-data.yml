name: AI Data Pipeline

on:
  schedule:
    - cron: "0 6 * * 1,4"   # Mon & Thu 06:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: "Debug logging"
        required: false
        default: "false"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
          SUPABASE_URL:                ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:        ${{ secrets.SUPABASE_SERVICE_KEY }}
          LOG_LEVEL: ${{ github.event.inputs.debug == 'true' && 'DEBUG' || 'INFO' }}
        run: python scripts/collect_data.py

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merged-models-${{ github.run_number }}
          path: data/merged_models.json
          retention-days: 14

      - name: Commit JSON
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/merged_models.json
          git diff --staged --quiet || git commit -m "chore: update model data [skip ci]"
          git push
